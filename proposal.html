<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💖 A Question For You 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Quicksand:wght@300;400;600;700&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(145deg, #fce4ec 0%, #f8bbd0 50%, #fce4ec 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        /* Floating Hearts Background */
        .hearts-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .heart-float {
            position: absolute;
            color: rgba(216, 27, 96, 0.12);
            font-size: 2rem;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) rotate(720deg) scale(1);
                opacity: 0;
            }
        }

        .container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 60px;
            box-shadow: 0 30px 80px rgba(183, 28, 28, 0.25);
            padding: 50px 40px;
            max-width: 550px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.6);
            animation: fadeInScale 0.8s ease;
        }

        .ring-icon {
            font-size: 4rem;
            display: block;
            margin-bottom: 10px;
            animation: pulse 2s ease-in-out infinite;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-style: italic;
            color: #880e4f;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #ad1457;
            font-size: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .question-text {
            font-family: 'Caveat', cursive;
            font-size: 2.5rem;
            color: #4a2c2c;
            margin: 20px 0 35px;
            line-height: 1.6;
        }

        .question-text .highlight {
            color: #d81b60;
            font-weight: 700;
        }

        /* Message that changes when No is clicked */
        .message-display {
            font-family: 'Caveat', cursive;
            font-size: 1.8rem;
            color: #d81b60;
            min-height: 70px;
            margin-bottom: 25px;
            transition: all 0.3s ease;
        }

        /* Button Container */
        .btn-group {
            display: flex;
            gap: 30px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            min-height: 100px;
        }

        .btn-yes {
            background: linear-gradient(135deg, #d81b60, #880e4f);
            color: white;
            border: none;
            padding: 18px 50px;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: 700;
            font-family: 'Quicksand', sans-serif;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 30px rgba(216, 27, 96, 0.35);
            letter-spacing: 1px;
            min-width: 140px;
            position: relative;
            z-index: 2;
        }

        .btn-yes:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 45px rgba(216, 27, 96, 0.45);
        }

        .btn-yes:active {
            transform: scale(0.95);
        }

        .btn-no {
            background: rgba(200, 200, 200, 0.3);
            color: #888;
            border: 2px solid #ddd;
            padding: 18px 50px;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: 600;
            font-family: 'Quicksand', sans-serif;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-width: 140px;
            position: relative;
            z-index: 1;
        }

        .btn-no:hover {
            background: rgba(200, 200, 200, 0.5);
        }

        /* Hidden state for No button */
        .btn-no.hidden {
            opacity: 0;
            transform: scale(0);
            pointer-events: none;
            min-width: 0;
            padding: 0;
            margin: 0;
            width: 0;
            border: none;
        }

        /* Celebration when Yes is clicked */
        .celebration {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            z-index: 999;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.5s ease;
        }

        .celebration.active {
            display: flex;
        }

        .celebration-content {
            background: white;
            padding: 50px 40px;
            border-radius: 60px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            animation: zoomIn 0.6s ease;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
        }

        .celebration-content .big-heart {
            font-size: 5rem;
            animation: pulse 1s ease-in-out infinite;
        }

        .celebration-content h2 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: #880e4f;
            font-size: 2.5rem;
            margin: 15px 0;
        }

        .celebration-content p {
            font-size: 1.2rem;
            color: #4a2c2c;
            margin-bottom: 25px;
        }

        .btn-gallery {
            background: linear-gradient(135deg, #d81b60, #880e4f);
            color: white;
            border: none;
            padding: 16px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'Quicksand', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px rgba(216, 27, 96, 0.3);
            text-decoration: none;
            display: inline-block;
        }

        .btn-gallery:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 45px rgba(216, 27, 96, 0.4);
        }

        /* Animations */
        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        @keyframes zoomIn {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .shake {
            animation: shake 0.5s ease-in-out;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
                border-radius: 40px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .question-text {
                font-size: 1.8rem;
            }

            .btn-yes, .btn-no {
                min-width: 100px;
                padding: 14px 30px;
                font-size: 1rem;
            }

            .btn-group {
                gap: 15px;
            }
        }
    </style>
</head>
<body>

    <!-- Floating Hearts -->
    <div class="hearts-bg" id="heartsBg"></div>

    <!-- Main Container -->
    <div class="container" id="mainContainer">
        <span class="ring-icon">💍</span>
        <h1>My Dearest Love</h1>
        <div class="subtitle">✦ A Special Question ✦</div>

        <div class="question-text">
            Will you be my<br><span class="highlight">Forever Valentine?</span>
        </div>

        <!-- Changing Message -->
        <div class="message-display" id="messageDisplay">💕</div>

        <!-- Buttons -->
        <div class="btn-group">
            <button class="btn-yes" id="btnYes">💖 Yes 💖</button>
            <button class="btn-no" id="btnNo">😅 No</button>
        </div>
    </div>

    <!-- Celebration Overlay (after Yes) -->
    <div class="celebration" id="celebration">
        <div class="celebration-content">
            <div class="big-heart">💖</div>
            <h2>Yayyy!! :3</h2>
            <p>I knew you'd say yes! You've made me the happiest person in the world. 💕</p>
            <p style="font-size:0.9rem; color:#888; margin-bottom:25px;">
                Now, let's relive all our beautiful memories together...
            </p>
            <a href="gallery.html" class="btn-gallery">📸 Enter Our Gallery</a>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION - Edit these messages!
        // ============================================
        const messages = [
            "💕",
            "Di nako nimo love? 🥺",
            "huhuhu...... 🥹",
            "Unsaon nalang koooo 😭",
            "Na hurt na akong Heart 💔",
            "Mo hilak nalang koo 😢",
            "Di na guddd? 🥺",
            "Sigee naaaa baa huhuhu mo crycry ko ron? 🥹",
            "I'll love you forever my bbyyyy! 💖",
        ];

        // ============================================
        // DON'T EDIT BELOW - Works automatically!
        // ============================================

        const btnYes = document.getElementById('btnYes');
        const btnNo = document.getElementById('btnNo');
        const messageDisplay = document.getElementById('messageDisplay');
        const celebration = document.getElementById('celebration');
        const mainContainer = document.getElementById('mainContainer');

        let noClicks = 0;
        let yesSize = 1;
        let noSize = 1;

        // Generate floating hearts
        function createHearts() {
            const bg = document.getElementById('heartsBg');
            const symbols = ['❤️', '💕', '💗', '💖', '💝', '💘'];
            for (let i = 0; i < 25; i++) {
                const heart = document.createElement('span');
                heart.className = 'heart-float';
                heart.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.fontSize = (Math.random() * 1.5 + 0.8) + 'rem';
                heart.style.animationDuration = (Math.random() * 12 + 8) + 's';
                heart.style.animationDelay = (Math.random() * 10) + 's';
                bg.appendChild(heart);
            }
        }
        createHearts();

        // No button click - grows Yes, shrinks No
        btnNo.addEventListener('click', function() {
            noClicks++;
            
            // Update message
            const msgIndex = Math.min(noClicks - 1, messages.length - 1);
            messageDisplay.textContent = messages[msgIndex];
            messageDisplay.classList.remove('shake');
            // Trigger reflow for animation
            void messageDisplay.offsetWidth;
            messageDisplay.classList.add('shake');

            // Grow Yes button
            yesSize += 0.15;
            btnYes.style.transform = `scale(${yesSize})`;
            btnYes.style.fontSize = (1.3 + (noClicks * 0.08)) + 'rem';
            btnYes.style.padding = (18 + (noClicks * 2)) + 'px ' + (50 + (noClicks * 5)) + 'px';
            
            // Shrink No button
            noSize -= 0.12;
            if (noSize <= 0.05) {
                btnNo.classList.add('hidden');
            } else {
                btnNo.style.transform = `scale(${noSize})`;
                btnNo.style.fontSize = (1.3 - (noClicks * 0.07)) + 'rem';
                btnNo.style.padding = (18 - (noClicks * 1.5)) + 'px ' + (50 - (noClicks * 4)) + 'px';
                btnNo.style.minWidth = Math.max(40, 140 - (noClicks * 12)) + 'px';
            }

            // Shake the No button
            btnNo.classList.add('shake');
            setTimeout(() => {
                btnNo.classList.remove('shake');
            }, 500);
        });

        // Yes button click - Show celebration
        btnYes.addEventListener('click', function() {
            celebration.classList.add('active');
            // Create some celebratory hearts
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const heart = document.createElement('span');
                    heart.style.position = 'fixed';
                    heart.style.fontSize = (Math.random() * 2 + 1) + 'rem';
                    heart.style.left = (Math.random() * 100) + '%';
                    heart.style.top = (Math.random() * 100) + '%';
                    heart.style.zIndex = '9999';
                    heart.style.pointerEvents = 'none';
                    heart.textContent = ['❤️', '💕', '💗', '💖', '💝', '💘', '🎉', '🥳'][Math.floor(Math.random() * 8)];
                    heart.style.animation = 'floatUp 2s ease-in-out forwards';
                    document.body.appendChild(heart);
                    setTimeout(() => heart.remove(), 2000);
                }, i * 100);
            }
        });

        // Keyboard support - Enter key clicks Yes
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !celebration.classList.contains('active')) {
                btnYes.click();
            }
        });

        console.log('💖 She said YES! 💖');
    </script>
</body>
</html>
